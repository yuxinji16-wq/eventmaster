# EventMaster Pro Docker Compose
# 生产环境配置

version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: eventmaster-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - DEBUG=false
      - DATABASE_URL=sqlite:///./data/eventmaster.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=["http://localhost:3000"]
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    networks:
      - eventmaster-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: eventmaster-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - eventmaster-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  eventmaster-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
  backend-logs:
    driver: local
